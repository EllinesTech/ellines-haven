<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-icon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-icon.png" />
    <link rel="shortcut icon" href="/logo-icon.png" />
    <link rel="apple-touch-icon" href="/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ellines Haven | Home For The Story Soul</title>
    <meta name="description" content="Discover original novels and short stories by Elijah Mwangi M — all inspired by true stories from East Africa. Buy once, read forever. Kenya's premier literary platform." />
    <meta name="keywords" content="Ellines Haven, Elijah Mwangi, Kenyan novels, African literature, East Africa books, online bookstore Kenya" />
    <meta name="author" content="Elijah Mwangi M" />

    <!-- Google Fonts — non-blocking preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Preconnect to external origins for faster first paint -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://firebase.googleapis.com" />
    <link rel="preconnect" href="https://www.googleapis.com" />
    <link rel="preconnect" href="https://storage.googleapis.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebase.googleapis.com" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://haven.ellines.co.ke" />
    <!-- Open Graph -->
    <meta property="og:title" content="Ellines Haven | Home For The Story Soul" />
    <meta property="og:description" content="Original novels and short stories from East Africa. Buy once, read forever." />
    <meta property="og:image" content="https://haven.ellines.co.ke/logo-rect.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://haven.ellines.co.ke" />
    <meta property="og:site_name" content="Ellines Haven" />
    <meta property="og:locale" content="en_KE" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ellines Haven | Home For The Story Soul" />
    <meta name="twitter:description" content="Original novels and short stories from East Africa. Buy once, read forever." />
    <meta name="twitter:image" content="https://haven.ellines.co.ke/logo-rect.png" />
    <meta name="twitter:site" content="@ElinesHaven" />
    <!-- Theme + PWA -->
    <meta name="theme-color" content="#0d0d1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ellines Haven" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Preload critical above-fold images -->
    <link rel="preload" as="image" href="/logo-icon.png" type="image/png" />
    <link rel="preload" as="image" href="/cover-marriage-is-a-scam.webp" type="image/webp" />
    <!-- Paystack — preload so it's ready before checkout -->
    <link rel="preload" href="https://js.paystack.co/v1/inline.js" as="script" />
    <link rel="preconnect" href="https://js.paystack.co" />
    <!-- PayPal — preconnect so SDK loads faster -->
    <link rel="preconnect" href="https://www.paypal.com" />
    <link rel="preconnect" href="https://www.paypalobjects.com" />
    <link rel="dns-prefetch" href="https://www.paypal.com" />
    <!-- Structured data — BookStore schema for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BookStore",
      "name": "Ellines Haven",
      "description": "Kenya's premier digital bookstore — original novels and short stories by Elijah Mwangi M, inspired by true East African stories.",
      "url": "https://haven.ellines.co.ke",
      "logo": "https://haven.ellines.co.ke/logo-icon.png",
      "image": "https://haven.ellines.co.ke/logo-rect.png",
      "telephone": "+254748255466",
      "email": "ellines.haven@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Nairobi",
        "addressCountry": "KE"
      },
      "paymentAccepted": "M-Pesa, Paystack, PayPal, Airtel Money, Visa, Mastercard",
      "currenciesAccepted": "KES, USD",
      "openingHours": "Mo-Sa 08:00-20:00",
      "sameAs": ["https://ellinestech.co.ke"]
    }
    </script>
    <!-- Person schema — Author -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Elijah Mwangi M",
      "url": "https://haven.ellines.co.ke/founder",
      "jobTitle": "Author",
      "worksFor": {
        "@type": "Organization",
        "name": "Ellines Haven"
      },
      "nationality": "Kenyan",
      "description": "Kenyan author of original novels and short stories inspired by real East African life. Founder of Ellines Haven.",
      "sameAs": ["https://haven.ellines.co.ke"]
    }
    </script>
    <!-- Block crawlers on non-production domains (e.g. pages.dev preview URLs) -->
    <script>
      if (location.hostname.includes('pages.dev')) {
        var m = document.createElement('meta');
        m.name = 'robots';
        m.content = 'noindex, nofollow';
        document.head.appendChild(m);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for offline support and fast repeat loads
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
