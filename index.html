    <!-- CRITICAL: Kill any service worker IMMEDIATELY before anything else loads -->
    <!-- This prevents stale SW cache from breaking JS chunk loading -->
    <script>
      (function(){
        try {
          if ('serviceWorker' in navigator) {
            // Synchronously check and unregister SWs
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
            // Nuke all caches
            if ('caches' in self) {
              caches.keys().then(function(keys) {
                keys.forEach(function(k) { caches.delete(k); });
              });
            }
          }
        } catch(e) {}
      })();
    </script>

    <script>

    <!-- CRITICAL: Stale deploy guard — MUST be in <head> BEFORE module scripts.
         Vite moves <script type="module"> into <head> during build, so this guard
         must also be in <head> to run first and redirect stale browsers. -->
    <script>
      (function(){
        var STAMP = '__BUILD_STAMP__';
        var KEY   = 'eh_build_v';
        var stored = sessionStorage.getItem(KEY);
        if (stored && stored !== STAMP) {
          sessionStorage.setItem(KEY, STAMP);
          if ('caches' in window) {
            caches.keys().then(function(k){ return Promise.all(k.map(function(n){ return caches.delete(n); })); })
              .then(function(){ window.location.replace(window.location.href.split('?')[0] + '?v=' + STAMP); })
              .catch(function(){ window.location.replace(window.location.href.split('?')[0] + '?v=' + STAMP); });
          } else {
            window.location.replace(window.location.href.split('?')[0] + '?v=' + STAMP);
          }
          throw new Error('Stale build — reloading for ' + STAMP);
        }
        sessionStorage.setItem(KEY, STAMP);
      })();
    </script>

  <body>

    <!-- Service Worker: DISABLED — causes cache corruption across deploys -->
    <!-- The site is hosted on Cloudflare Pages CDN which handles caching natively. -->
    <!-- A faulty SW is worse than no SW. PWA install still works via manifest.json. -->
    <script>
      // Unregister any old service workers so users who had them get cleaned up
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        // Clear all SW caches
        if ('caches' in window) {
          caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
        }
      }
    </script>
