<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bgar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1a0a"/>
      <stop offset="30%" stop-color="#1a3510"/>
      <stop offset="60%" stop-color="#2d5520"/>
      <stop offset="100%" stop-color="#0d1a0a"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2010"/>
      <stop offset="100%" stop-color="#3a3020"/>
    </linearGradient>
    <linearGradient id="ovar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.2)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
    </linearGradient>
    <linearGradient id="sky_ar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1505"/>
      <stop offset="60%" stop-color="#163010"/>
      <stop offset="100%" stop-color="#2a5020"/>
    </linearGradient>
    <filter id="softblur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bgar)"/>

  <!-- Sky with golden hour light -->
  <rect x="0" y="0" width="400" height="240" fill="url(#sky_ar)"/>

  <!-- Golden light rays from horizon -->
  <g opacity="0.15">
    <polygon points="200,180 100,0 130,0" fill="#ffd060"/>
    <polygon points="200,180 160,0 190,0" fill="#ffd060"/>
    <polygon points="200,180 220,0 250,0" fill="#ffd060"/>
    <polygon points="200,180 270,0 300,0" fill="#ffd060"/>
  </g>

  <!-- Misty horizon -->
  <ellipse cx="200" cy="200" rx="280" ry="25" fill="#c8d060" opacity="0.12"/>

  <!-- Rift Valley landscape layers -->
  <path d="M0,235 Q100,190 200,210 Q300,190 400,235 L400,260 Q300,240 200,250 Q100,240 0,260 Z" fill="#1a3510" opacity="0.8"/>
  <path d="M0,255 Q80,225 160,238 Q230,222 320,235 Q370,228 400,240 L400,265 L0,265 Z" fill="#203a12" opacity="0.9"/>

  <!-- Dusty red road stretching into distance (Rift Valley road) -->
  <path d="M160,230 L180,280 L220,280 L240,230 Z" fill="#8b5520" opacity="0.5"/>
  <path d="M140,280 L165,370 L235,370 L260,280 Z" fill="#9a6030"/>
  <path d="M100,370 L155,560 L245,560 L300,370 Z" fill="url(#road)"/>

  <!-- Road centre dashes -->
  <g fill="#c9a84c" opacity="0.5">
    <rect x="197" y="390" width="6" height="25" rx="3"/>
    <rect x="196" y="435" width="6" height="25" rx="3"/>
    <rect x="195" y="480" width="6" height="25" rx="3"/>
    <rect x="194" y="525" width="6" height="25" rx="3"/>
    <rect x="198" y="360" width="5" height="18" rx="2"/>
  </g>

  <!-- Acacia trees lining the road -->
  <!-- Left acacia 1 -->
  <g>
    <rect x="70" y="250" width="9" height="130" fill="#2a1a08"/>
    <ellipse cx="85" cy="245" rx="38" ry="16" fill="#0d1a05"/>
    <ellipse cx="70" cy="255" rx="28" ry="12" fill="#0f2008"/>
    <ellipse cx="90" cy="252" rx="35" ry="14" fill="#0a1505" opacity="0.8"/>
  </g>

  <!-- Left acacia 2 (smaller, further) -->
  <g opacity="0.75">
    <rect x="118" y="225" width="6" height="50" fill="#2a1a08"/>
    <ellipse cx="128" cy="220" rx="26" ry="11" fill="#0d1a05"/>
    <ellipse cx="118" cy="226" rx="20" ry="9" fill="#0a1505" opacity="0.8"/>
  </g>

  <!-- Right acacia 1 -->
  <g>
    <rect x="320" y="255" width="9" height="120" fill="#2a1a08"/>
    <ellipse cx="313" cy="250" rx="38" ry="16" fill="#0d1a05"/>
    <ellipse cx="330" cy="258" rx="28" ry="12" fill="#0f2008"/>
    <ellipse cx="315" cy="253" rx="36" ry="14" fill="#0a1505" opacity="0.8"/>
  </g>

  <!-- Right acacia 2 (smaller, further) -->
  <g opacity="0.75">
    <rect x="275" y="228" width="6" height="45" fill="#2a1a08"/>
    <ellipse cx="268" cy="223" rx="26" ry="11" fill="#0d1a05"/>
    <ellipse cx="278" cy="228" rx="20" ry="9" fill="#0a1505" opacity="0.8"/>
  </g>

  <!-- Two small figures on the road (the two strangers) -->
  <g fill="#0a0f05" opacity="0.85">
    <!-- Figure 1 -->
    <circle cx="188" cy="325" r="4"/>
    <rect x="186" y="329" width="5" height="12" rx="2"/>
    <rect x="184" y="341" width="3" height="8" rx="1"/>
    <rect x="189" y="341" width="3" height="8" rx="1"/>
    <!-- Figure 2 -->
    <circle cx="208" cy="323" r="4"/>
    <rect x="206" y="327" width="5" height="12" rx="2"/>
    <rect x="204" y="339" width="3" height="8" rx="1"/>
    <rect x="209" y="339" width="3" height="8" rx="1"/>
  </g>

  <!-- Fireflies / dust motes -->
  <g fill="#ffd060" opacity="0.4">
    <circle cx="130" cy="295" r="1.5"/>
    <circle cx="260" cy="308" r="1.2"/>
    <circle cx="155" cy="320" r="1"/>
    <circle cx="245" cy="285" r="1.3"/>
    <circle cx="160" cy="350" r="1"/>
    <circle cx="250" cy="345" r="1.5"/>
  </g>

  <!-- Overlay -->
  <rect width="400" height="560" fill="url(#ovar)"/>

  <!-- Pink/rose accent for romance -->
  <rect x="0" y="378" width="400" height="2" fill="#ff9060" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="408" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0ead0" text-anchor="middle" letter-spacing="1">THE ACACIA</text>
  <text x="200" y="442" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#f0ead0" text-anchor="middle" letter-spacing="1">ROAD</text>

  <!-- Line -->
  <line x1="85" y1="454" x2="315" y2="454" stroke="#c9a84c" stroke-width="1.2" opacity="0.7"/>
  <text x="200" y="469" font-family="Georgia, serif" font-size="11" fill="#c9a84c" text-anchor="middle" letter-spacing="2" font-style="italic">A Story of Second Chances</text>

  <!-- Author -->
  <text x="200" y="495" font-family="Georgia, serif" font-size="13" fill="#c9a84c" text-anchor="middle" letter-spacing="2" font-style="italic">Elijah Mwangi M</text>

  <!-- Publisher -->
  <text x="200" y="520" font-family="Arial, sans-serif" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="1.5" opacity="0.7">ELLINES HAVEN</text>

  <!-- Genre -->
  <rect x="150" y="527" width="100" height="18" rx="9" fill="rgba(255,120,60,0.1)" stroke="#ff9060" stroke-width="0.8" opacity="0.8"/>
  <text x="200" y="539" font-family="Arial, sans-serif" font-size="8.5" fill="#ff9060" text-anchor="middle" letter-spacing="1.5">ROMANCE NOVEL</text>
</svg>
