<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="bgmm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000510"/>
      <stop offset="50%" stop-color="#001428"/>
      <stop offset="100%" stop-color="#00203a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#003050"/>
      <stop offset="100%" stop-color="#00101e"/>
    </linearGradient>
    <linearGradient id="ovmm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.92)"/>
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="25%" r="12%">
      <stop offset="0%" stop-color="#fffae0"/>
      <stop offset="70%" stop-color="#c8d8f0" opacity="0.5"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#bgmm)"/>

  <!-- Moon glow -->
  <circle cx="290" cy="80" r="50" fill="url(#moon)" opacity="0.7"/>
  <circle cx="290" cy="80" r="22" fill="#fffae0" opacity="0.9" filter="url(#glow2)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="30" cy="30" r="1.2" opacity="0.9"/>
    <circle cx="60" cy="20" r="0.8" opacity="0.7"/>
    <circle cx="100" cy="40" r="1" opacity="0.8"/>
    <circle cx="140" cy="15" r="0.9" opacity="0.7"/>
    <circle cx="180" cy="35" r="1.1" opacity="0.9"/>
    <circle cx="220" cy="20" r="0.8" opacity="0.7"/>
    <circle cx="360" cy="25" r="1" opacity="0.8"/>
    <circle cx="370" cy="55" r="0.7" opacity="0.6"/>
    <circle cx="20" cy="70" r="0.8" opacity="0.7"/>
    <circle cx="50" cy="90" r="1" opacity="0.6"/>
    <circle cx="160" cy="60" r="0.7" opacity="0.6"/>
    <circle cx="340" cy="100" r="0.9" opacity="0.7"/>
    <circle cx="80" cy="110" r="0.8" opacity="0.5"/>
  </g>

  <!-- Moon reflection on water (shimmer) -->
  <g opacity="0.35">
    <rect x="278" y="295" width="8" height="80" rx="4" fill="#fffae0"/>
    <rect x="288" y="300" width="4" height="70" rx="2" fill="#fffae0"/>
    <rect x="270" y="310" width="3" height="55" rx="2" fill="#fffae0"/>
    <rect x="295" y="318" width="3" height="45" rx="2" fill="#fffae0"/>
  </g>

  <!-- Sea -->
  <rect x="0" y="288" width="400" height="100" fill="url(#sea)" opacity="0.8"/>

  <!-- Fort Jesus / old town silhouette -->
  <g fill="#000a15">
    <!-- Fort battlements -->
    <rect x="30" y="200" width="120" height="95"/>
    <rect x="25" y="190" width="18" height="20"/>
    <rect x="48" y="190" width="15" height="20"/>
    <rect x="68" y="190" width="18" height="20"/>
    <rect x="91" y="190" width="15" height="20"/>
    <rect x="111" y="190" width="18" height="20"/>
    <rect x="134" y="190" width="15" height="20"/>

    <!-- Old town building left -->
    <rect x="0" y="225" width="40" height="68"/>
    <rect x="5" y="215" width="30" height="14"/>

    <!-- Minaret -->
    <rect x="170" y="170" width="22" height="120"/>
    <rect x="165" y="265" width="32" height="8"/>
    <!-- Minaret dome -->
    <ellipse cx="181" cy="170" rx="14" ry="18" fill="#000a15"/>
    <!-- Minaret crescent -->
    <path d="M176,155 A12,12,0,0,1,186,148 A8,8,0,0,0,176,155Z" fill="#c9a84c" opacity="0.8"/>

    <!-- Buildings right -->
    <rect x="250" y="220" width="150" height="75"/>
    <rect x="260" y="205" width="35" height="20"/>
    <rect x="305" y="210" width="28" height="18"/>
    <rect x="345" y="200" width="40" height="25"/>

    <!-- Dhow silhouette on water -->
    <path d="M80,290 Q130,275 170,290 Q160,300 90,300 Z" fill="#001020"/>
    <rect x="120" y="265" width="3" height="30" fill="#001020"/>
    <path d="M95,278 L123,268 L123,280 Z" fill="#001020"/>
  </g>

  <!-- Overlay -->
  <rect width="400" height="560" fill="url(#ovmm)"/>

  <!-- Teal accent line (Swahili colour) -->
  <rect x="0" y="368" width="400" height="2" fill="#00b8b8" opacity="0.5"/>

  <!-- Title -->
  <text x="200" y="400" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#c8e8f8" text-anchor="middle" letter-spacing="1">MIDNIGHT IN</text>
  <text x="200" y="435" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#c8e8f8" text-anchor="middle" letter-spacing="2">MOMBASA</text>

  <!-- Line -->
  <line x1="75" y1="447" x2="325" y2="447" stroke="#00b8b8" stroke-width="1" opacity="0.7"/>
  <text x="200" y="462" font-family="Georgia, serif" font-size="11" fill="#00b8b8" text-anchor="middle" letter-spacing="2" font-style="italic">A Swahili Coast Thriller</text>

  <!-- Author -->
  <text x="200" y="488" font-family="Georgia, serif" font-size="13" fill="#c9a84c" text-anchor="middle" letter-spacing="2" font-style="italic">Elijah Mwangi M</text>

  <!-- Publisher -->
  <text x="200" y="515" font-family="Arial, sans-serif" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="1.5" opacity="0.7">ELLINES HAVEN</text>

  <!-- Genre -->
  <rect x="149" y="522" width="102" height="18" rx="9" fill="rgba(0,184,184,0.12)" stroke="#00b8b8" stroke-width="0.8" opacity="0.8"/>
  <text x="200" y="534" font-family="Arial, sans-serif" font-size="8.5" fill="#00b8b8" text-anchor="middle" letter-spacing="1.5">MYSTERY THRILLER</text>
</svg>
