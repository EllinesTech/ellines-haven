##############################################################################
# ELLINES HAVEN — DEPLOYMENT NOTES
#
# HOSTING: Cloudflare Pages handles all web hosting automatically.
#   - Every push to `main` triggers a Cloudflare Pages build + deploy.
#   - NO manual deploy needed. Just `git push origin main`.
#   - Live site: haven.ellines.co.ke
#
# FIREBASE: Used for Firestore database, Auth, Storage, and Cloud Functions.
#   - Firebase does NOT host the website.
#   - This workflow deploys ONLY Firestore security rules + Cloud Functions.
#   - DO NOT add `--only hosting` to firebase deploy here.
#
# Admin email: ellines.haven@gmail.com
##############################################################################

name: Deploy Firestore Rules & Functions

on:
  push:
    branches:
      - main
    paths:
      - 'firestore.rules'
      - 'functions/**'

jobs:
  deploy_firebase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELLINES_HAVEN_WEB }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules + Cloud Functions only
        run: firebase deploy --only firestore:rules,functions --project ellines-haven-web

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/sa.json
