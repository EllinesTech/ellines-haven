##############################################################################
# ELLINES HAVEN — DEPLOYMENT NOTES
#
# HOSTING: Cloudflare Pages handles all web hosting automatically.
#   - Every push to `main` triggers a Cloudflare Pages build + deploy.
#   - NO manual deploy needed. Just `git push origin main`.
#   - Live site: haven.ellines.co.ke
#
# FIREBASE: Used for Firestore database, Auth, Storage, and Cloud Functions.
#   - Firebase does NOT host the website.
#   - This workflow deploys ONLY Firestore security rules + Cloud Functions.
#   - DO NOT add `--only hosting` to firebase deploy here.
#
# Admin email: ellines.haven@gmail.com
##############################################################################

name: Deploy Firebase + Auto-merge feature branches

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
    paths-ignore:
      - '**.md'
      - '.claude/**'

jobs:
  # ── Job 1: Auto-merge any feature/fix branch into main ─────────────────────
  # This ensures code pushed to feature branches always reaches the live site.
  auto_merge_to_main:
    name: Auto-merge to main
    runs-on: ubuntu-latest
    if: |
      github.ref != 'refs/heads/main' &&
      (startsWith(github.ref, 'refs/heads/feature/') ||
       startsWith(github.ref, 'refs/heads/fix/') ||
       startsWith(github.ref, 'refs/heads/hotfix/'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge branch into main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git checkout main
          git pull origin main
          git merge --no-ff "origin/$BRANCH" -m "auto-merge: $BRANCH → main [skip ci partial]"
          git push origin main
          echo "✅ Merged $BRANCH into main successfully"

  # ── Job 2: Deploy Firestore rules + Cloud Functions (main only) ─────────────
  deploy_firebase:
    name: Deploy Firebase rules & functions
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # Only run when relevant files change
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if Firebase files changed
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -qE '^(firestore\.rules|functions/)' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup Node 22
        if: steps.changed.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install functions dependencies
        if: steps.changed.outputs.changed == 'true'
        run: npm install
        working-directory: functions

      - name: Authenticate with Firebase
        if: steps.changed.outputs.changed == 'true'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELLINES_HAVEN_WEB }}' > /tmp/sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        if: steps.changed.outputs.changed == 'true'
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules + Cloud Functions only
        if: steps.changed.outputs.changed == 'true'
        run: firebase deploy --only firestore:rules,functions --project ellines-haven-web

      - name: Clean up credentials
        if: always() && steps.changed.outputs.changed == 'true'
        run: rm -f /tmp/sa.json

      - name: Skip message
        if: steps.changed.outputs.changed == 'false'
        run: echo "No Firebase files changed — skipping Firebase deploy"
