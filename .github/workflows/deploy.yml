name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELLINES_HAVEN_WEB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Write service account key
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ELLINES_HAVEN_WEB }}' > /tmp/sa_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa_key.json" >> $GITHUB_ENV

      - name: Install Firebase Tools
        run: npm install -g firebase-tools@latest

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project ellines-haven-web
